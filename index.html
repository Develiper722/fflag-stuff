<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox FFlag Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #0f0f0f; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .container { margin-top: 40px; }
        .card { background-color: #1a1a1a; border: 1px solid #333; padding: 25px; border-radius: 12px; }
        .clickable-row { cursor: pointer; }
        .clickable-row:hover { background-color: #252525 !important; }
        .table-dark { --bs-table-bg: #1a1a1a; }
        input[type="search"], .form-select { 
            background: #252525 !important; 
            border: 1px solid #444 !important; 
            color: white !important; 
        }
        .badge-active { background-color: #198754; }
        .badge-removed { background-color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <div id="mainContent" class="card shadow-lg"></div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
let allFlags = [];
let currentSearch = "";
let currentStatusFilter = "";

$(document).ready(async function() {
    try {
        const response = await fetch('flags.json');
        allFlags = await response.json();
        const urlParams = new URLSearchParams(window.location.search);
        const initialFlag = urlParams.get('flag');
        initialFlag ? showFlagDetail(initialFlag) : showListView();
    } catch (err) {
        $('#mainContent').html(`<div class="alert alert-danger">Error loading data.</div>`);
    }

    window.onpopstate = function() {
        const params = new URLSearchParams(window.location.search);
        const flag = params.get('flag');
        flag ? showFlagDetail(flag, false) : showListView(false);
    };
});

function showListView(pushState = true) {
    if (pushState) history.pushState({}, '', window.location.pathname);

    $('#mainContent').html(`
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 m-0">Roblox FFlag Tracker</h1>
            <select id="statusFilter" class="form-select w-25">
                <option value="">All Statuses</option>
                <option value="Active" ${currentStatusFilter === 'Active' ? 'selected' : ''}>Active Only</option>
                <option value="Removed" ${currentStatusFilter === 'Removed' ? 'selected' : ''}>Removed Only</option>
            </select>
        </div>
        <table id="flagTable" class="table table-dark table-hover w-100">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Flag Name</th>
                    <th>Status</th>
                    <th>Patch Date</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    `);

    const table = $('#flagTable').DataTable({
        data: allFlags,
        search: { "search": currentSearch },
        columns: [
            { data: "type" },
            { data: "name", render: d => `<strong>${d}</strong>` },
            { data: "status", render: d => `<span class="badge ${d === 'Active' ? 'badge-active' : 'badge-removed'}">${d}</span>` },
            { data: "date" }
        ],
        createdRow: (row, data) => {
            $(row).addClass('clickable-row').on('click', () => {
                currentSearch = table.search();
                showFlagDetail(data.name);
            });
        }
    });

    $.fn.dataTable.ext.search.push(function(settings, data) {
        const status = data[2];
        return currentStatusFilter === "" || status === currentStatusFilter;
    });

    $('#statusFilter').on('change', function() {
        currentStatusFilter = $(this).val();
        table.draw();
    });

    table.draw();
}

function showFlagDetail(name, pushState = true) {
    const flag = allFlags.find(f => f.name === name);
    if (!flag) return showListView();

    if (pushState) history.pushState({}, '', `?flag=${name}`);

    // If type is "C++", we use "FFlag", otherwise use the type from JSON
    const cleanType = (flag.type === "C++") ? "FFlag" : flag.type;
    const jsonString = `"${cleanType}${flag.name}": "True"`;
    const bloxstrapFormat = `${cleanType}${flag.name}=True`;

    $('#mainContent').html(`
        <button class="btn btn-sm btn-outline-secondary mb-3" onclick="showListView()">← Back to Results</button>
        <h2 class="text-info">${flag.name}</h2>
        <hr class="border-secondary">
        <div class="row mb-4">
            <div class="col-sm-6">
                <p class="mb-1 text-muted small text-uppercase">Raw Type</p>
                <p class="h5">${flag.type}</p>
            </div>
            <div class="col-sm-6">
                <p class="mb-1 text-muted small text-uppercase">Status</p>
                <p class="h5 text-${flag.status === 'Active' ? 'success' : 'danger'}">${flag.status}</p>
            </div>
        </div>
        <div class="p-3 rounded bg-dark border border-secondary mb-4">
            <code id="jsonCode">${jsonString}</code>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary" onclick="navigator.clipboard.writeText('${flag.name}')">Copy Name</button>
            <button class="btn btn-outline-light" onclick="navigator.clipboard.writeText('${bloxstrapFormat}')">Copy for Bloxstrap</button>
        </div>
    `);
}
</script>
</body>
</html>
