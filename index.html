<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox FFlag Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .container { margin-top: 50px; }
        .card { background-color: #1e1e1e; border: 1px solid #333; padding: 20px; border-radius: 10px; }
        .badge-active { background-color: #28a745; }
        .badge-removed { background-color: #dc3545; }
        table.dataTable { color: #e0e0e0 !important; border-color: #333; }
        .dataTables_wrapper .dataTables_length, .dataTables_wrapper .dataTables_filter { color: #e0e0e0 !important; }
        input[type="search"] { background-color: #2a2a2a !important; color: white !important; border: 1px solid #444 !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow">
        <h2 class="mb-4">Roblox FFlag Patch Tracker</h2>
        <p class="text-secondary">Search and filter through the latest Roblox Fast Flags and their patch statuses.</p>
        
        <table id="flagTable" class="table table-dark table-hover table-striped w-100">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Flag Name</th>
                    <th>Status</th>
                    <th>Patch Date</th>
                    <th>Version</th>
                </tr>
            </thead>
            <tbody id="flagBody">
                </tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
async function loadFlags() {
    try {
        // Fetch your text file
        const response = await fetch('flag_dump-2.txt');
        const text = await response.text();
        const lines = text.split('\n');
        const tbody = document.getElementById('flagBody');

        lines.forEach(line => {
            if (!line.trim()) return;

            // Simple Regex to parse: [Type] Name | Status | Version (Date)
            const regex = /\[(.*?)\]\s+(.*?)\s+\|\s+(.*?)(?:\s+\|\s+Removed in version:\s+(.*?)\s+\((.*?)\))?$/;
            const match = line.match(regex);

            if (match) {
                const [_, type, name, status, version, date] = match;
                const statusClass = status.includes('Active') ? 'badge-active' : 'badge-removed';
                
                const row = `<tr>
                    <td><small class="text-muted">${type}</small></td>
                    <td><strong>${name}</strong></td>
                    <td><span class="badge ${statusClass}">${status}</span></td>
                    <td>${date || 'N/A'}</td>
                    <td><small>${version || 'N/A'}</small></td>
                </tr>`;
                tbody.innerHTML += row;
            }
        });

        // Initialize DataTables for instant search/pagination
        $('#flagTable').DataTable({
            "pageLength": 25,
            "order": [[ 3, "desc" ]] // Sort by date by default
        });

    } catch (err) {
        console.error("Error loading flags:", err);
    }
}

loadFlags();
</script>

</body>
</html>
