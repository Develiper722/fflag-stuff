<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox FFlag Tracker (JSON Edition)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #0f0f0f; color: #f0f0f0; font-family: 'Inter', sans-serif; }
        .container { margin-top: 40px; }
        .card { background-color: #1a1a1a; border: 1px solid #333; padding: 25px; border-radius: 12px; }
        .badge-active { background-color: #198754; color: white; }
        .badge-removed { background-color: #dc3545; color: white; }
        .type-tag { font-family: monospace; color: #888; font-size: 0.85rem; }
        /* DataTable Dark Overrides */
        .dataTables_wrapper { color: #f0f0f0; }
        input[type="search"] { background: #252525 !important; border: 1px solid #444 !important; color: white !important; }
        .table-dark { --bs-table-bg: #1a1a1a; }
    </style>
</head>
<body>

<div class="container">
    <div class="card shadow-lg">
        <h1 class="h3 mb-2">Roblox FFlag Tracker</h1>
        <p class="text-muted mb-4">shows ya if its ur fflag injector or roblox removed it.</p>
        
        <table id="flagTable" class="table table-dark table-hover w-100">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Flag Name</th>
                    <th>Status</th>
                    <th>Patch Date</th>
                    <th>Version</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

<script>
$(document).ready(function() {
    $('#flagTable').DataTable({
        "ajax": {
            "url": "flags.json",
            "dataSrc": ""
        },
        "language": {
            // This line changes the "Show X entries" text
            "lengthMenu": "Show _MENU_ entries per page",
            "search": "Search Flags:",
            "info": "Showing _START_ to _END_ of _TOTAL_ flags"
        },
        "columns": [
            { "data": "type", "className": "type-tag" },
            { "data": "name", "render": function(data) { return `<strong>${data}</strong>`; } },
            { 
                "data": "status", 
                "render": function(data) {
                    let cls = data === "Active" ? "badge-active" : "badge-removed";
                    return `<span class="badge ${cls}">${data}</span>`;
                }
            },
            { "data": "date" },
            { "data": "version", "className": "small text-muted" }
        ],
        "pageLength": 25,
        "order": [[ 3, "desc" ]],
        "responsive": true
    });
});
</script>
</body>
</html>
